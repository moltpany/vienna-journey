<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vienna Journey · 维也纳文化地图</title>
  <meta name="description" content="一张维也纳的文化地图：音乐、艺术、建筑、哲学、精神分析、文学，1780–1938年帝国黄金时代的思想版图。" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <script>try{if(localStorage.getItem('vienna-journey-theme')==='light')document.documentElement.classList.add('theme-light');}catch(e){}</script>
</head>
<body>

<!-- ── HEADER ────────────────────────────────────── -->
<header id="header">
  <div id="site-title">Vienna Journey<span data-i18n="subtitle">维也纳文化地图</span></div>

  <div id="view-toggle">
    <button class="view-btn active" data-view="map" type="button" data-i18n="view-map">🗺 地图</button>
    <button class="view-btn" data-view="list" type="button" data-i18n="view-list">☰ 列表</button>
  </div>

  <div id="category-filters">
    <button class="cat-btn active" data-cat="music">
      <span class="dot"></span><span data-i18n="cat-music">音乐</span>
    </button>
    <button class="cat-btn active" data-cat="visual-art">
      <span class="dot"></span><span data-i18n="cat-visual-art">视觉艺术</span>
    </button>
    <button class="cat-btn active" data-cat="architecture">
      <span class="dot"></span><span data-i18n="cat-architecture">建筑</span>
    </button>
    <button class="cat-btn active" data-cat="psychoanalysis">
      <span class="dot"></span><span data-i18n="cat-psychoanalysis">精神分析</span>
    </button>
    <button class="cat-btn active" data-cat="philosophy">
      <span class="dot"></span><span data-i18n="cat-philosophy">哲学</span>
    </button>
    <button class="cat-btn active" data-cat="literature">
      <span class="dot"></span><span data-i18n="cat-literature">文学</span>
    </button>
  </div>

  <input id="search-box" type="search" placeholder="搜索作品或人物…" data-i18n-ph="search-ph" />

  <button id="lang-toggle" type="button" data-i18n="lang-btn">EN</button>
  <button id="theme-toggle" type="button" title="切换深色 / 浅色" aria-label="切换主题" data-i18n-title="theme-title">🌙</button>
</header>

<!-- ── MAIN LAYOUT ────────────────────────────────── -->
<div id="layout">

  <!-- MAP -->
  <div id="map-container">
    <div id="map"></div>
  </div>

  <!-- LIST -->
  <div id="list-container">
    <div id="list-meta"><span id="list-count"></span></div>
    <div id="list-grid"><!-- populated by JS --></div>
  </div>

  <!-- DETAIL PANEL -->
  <aside id="detail-panel">
    <div id="detail-empty">
      <div class="empty-icon">🗺</div>
      <p data-i18n-html="empty">点击地图标记、作品列表<br>或时间轴上的节点<br>探索维也纳的文化版图</p>
    </div>

    <div id="detail-content">
      <button id="detail-back" type="button" data-i18n="back-to-map">🗺 在地图上查看</button>
      <div id="detail-header">
        <div class="detail-cat-badge" id="detail-badge">
          <span class="dot" id="detail-badge-dot"></span>
          <span id="detail-badge-label"></span>
        </div>
        <div id="detail-work"></div>
        <div id="detail-person"></div>
        <div id="detail-meta"></div>
      </div>

      <div id="detail-body">
        <figure id="detail-image" style="display:none"></figure>
        <div class="detail-section" id="section-context">
          <div class="detail-section-label" data-i18n="lbl-context">背景</div>
          <p id="detail-context"></p>
        </div>

        <div class="detail-divider"></div>

        <div class="detail-section" id="section-meaning">
          <div class="detail-section-label" data-i18n="lbl-meaning">意义</div>
          <p id="detail-meaning"></p>
        </div>

        <div class="detail-divider"></div>

        <div class="detail-section" id="section-place">
          <div class="detail-section-label" data-i18n="lbl-place">地点</div>
          <div class="detail-place-block" id="detail-place"></div>
        </div>

        <div class="detail-section" id="section-links" style="display:none">
          <div class="detail-section-label" data-i18n="lbl-links">延伸阅读</div>
          <div class="detail-links" id="detail-links"></div>
        </div>

        <div class="detail-section" id="section-source">
          <div class="detail-section-label" data-i18n="lbl-source">来源</div>
          <div class="detail-source" id="detail-source"></div>
        </div>
      </div>
    </div>
  </aside>
</div>

<!-- ── TIMELINE ───────────────────────────────────── -->
<div id="timeline-bar">
  <div id="timeline-inner">
    <div id="timeline-axis"></div>
    <!-- populated by JS -->
  </div>
</div>

<!-- ── MILESTONE TOOLTIP ──────────────────────────── -->
<div id="milestone-tooltip">
  <div class="ms-year" id="ms-year"></div>
  <div class="ms-label" id="ms-label"></div>
  <div class="ms-desc" id="ms-desc"></div>
</div>

<script src="script.js"></script>
</body>
</html>
